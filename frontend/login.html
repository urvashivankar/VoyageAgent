<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – TripPilot AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        }
        .auth-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw; height: 70vw;
            background: radial-gradient(circle, rgba(59,130,246,0.2) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }
        .auth-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 3rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.5rem;
            backdrop-filter: blur(20px);
        }
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-decoration: none;
        }
        .auth-tabs {
            display: flex;
            background: rgba(255,255,255,0.05);
            border-radius: .75rem;
            padding: .25rem;
            margin-bottom: 2rem;
        }
        .auth-tab {
            flex: 1;
            padding: .75rem;
            text-align: center;
            border-radius: .5rem;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            transition: var(--transition);
            border: none;
            background: transparent;
            font-size: 1rem;
        }
        .auth-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            font-size: .875rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: .5rem;
        }
        .form-input {
            width: 100%;
            padding: .875rem 1.125rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: .75rem;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
            outline: none;
        }
        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .form-input::placeholder { color: #475569; }
        .btn-auth {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: .75rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: .75rem;
            font-family: inherit;
        }
        .btn-auth:hover { opacity: .9; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(59,130,246,0.4); }
        .btn-auth:disabled { opacity: .5; cursor: not-allowed; transform: none; }
        .divider {
            text-align: center;
            color: var(--text-muted);
            font-size: .875rem;
            margin: 1.25rem 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .error-msg {
            padding: .75rem 1rem;
            background: rgba(244,63,94,0.1);
            border: 1px solid rgba(244,63,94,0.3);
            border-radius: .5rem;
            color: #f43f5e;
            font-size: .875rem;
            margin-bottom: 1rem;
            display: none;
        }
        .success-msg {
            padding: .75rem 1rem;
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: .5rem;
            color: #10b981;
            font-size: .875rem;
            margin-bottom: 1rem;
            display: none;
        }
        .back-home {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: .875rem;
            transition: var(--transition);
        }
        .back-home:hover { color: white; }
        .form-panel { display: none; }
        .form-panel.active { display: block; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-glow"></div>
        <div class="auth-card">
            <a href="index.html" class="auth-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#g1)" stroke-width="2">
                    <defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#9333ea"/></linearGradient></defs>
                    <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l5 5-3 3-3-1-1.5 1.5L4 18l1.5 3.5L7 20l-1-3 3-3 5 5 1.2-.7c.4-.2.7-.6.6-1.1z"/>
                </svg>
                <span class="gradient-text">TripPilot AI</span>
            </a>

            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
            </div>

            <div id="error-msg" class="error-msg"></div>
            <div id="success-msg" class="success-msg"></div>

            <!-- Login Form -->
            <div id="panel-login" class="form-panel active">
                <form id="login-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
                    </div>

                    <button type="submit" class="btn-auth" id="login-btn">Sign In</button>
                </form>
            </div>

            <!-- Register Form -->
            <div id="panel-register" class="form-panel">
                <form id="register-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="reg-name" class="form-input" placeholder="Alex Johnson" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="reg-email" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="text" id="reg-mobile" class="form-input" placeholder="+1-555-1234" required>
                    </div>
                    <button type="submit" class="btn-auth" id="register-btn">Create Account</button>
                </form>
            </div>

            <a href="index.html" class="back-home">← Back to home</a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Redirect if already logged in
        if (getToken()) window.location.href = 'dashboard.html';

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('panel-' + tab).classList.add('active');
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('success-msg').style.display = 'none';
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('success-msg').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('success-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('error-msg').style.display = 'none';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.textContent = 'Signing in...';
            btn.disabled = true;
            document.getElementById('error-msg').style.display = 'none';
            try {
                await login(
                    document.getElementById('login-email').value
                );
                window.location.href = 'dashboard.html';
            } catch (err) {
                showError(err.message);
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            btn.textContent = 'Creating account...';
            btn.disabled = true;
            document.getElementById('error-msg').style.display = 'none';
            try {
                await register(
                    document.getElementById('reg-name').value,
                    document.getElementById('reg-email').value,
                    document.getElementById('reg-mobile').value
                );
                showSuccess('Account created! Signing you in...');
                setTimeout(() => {
                    login(
                        document.getElementById('reg-email').value,
                        ''
                    ).then(() => { window.location.href = 'dashboard.html'; });
                }, 1000);
            } catch (err) {
                showError(err.message);
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        });

        function demoLogin() {
            // Store demo token so protected pages work
            setToken('demo_token');
            setUser({ name: 'Demo User', email: 'demo@trippilot.ai' });
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
