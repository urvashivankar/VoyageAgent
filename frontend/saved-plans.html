<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Plans - TripPilot AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body{background:#030303}.shell{max-width:1180px;margin:0 auto;padding:2rem}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;gap:1rem;flex-wrap:wrap}.tabs{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1rem}.tab{border:1px solid var(--glass-border);background:rgba(255,255,255,.04);color:white;border-radius:.5rem;padding:.7rem 1rem;cursor:pointer}.tab.active{background:rgba(59,130,246,.18);border-color:#3b82f6}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem}.card{background:rgba(255,255,255,.035);border:1px solid var(--glass-border);border-radius:.5rem;overflow:hidden}.card-img{height:150px;background-size:cover;background-position:center}.card-body{padding:1rem}.meta{color:var(--text-muted);font-size:.9rem}.empty{text-align:center;border:1px dashed var(--glass-border);border-radius:.5rem;padding:4rem 1rem;background:rgba(255,255,255,.025)}
    </style>
</head>
<body>
<main class="shell">
    <div class="topbar"><a href="dashboard.html" class="logo"><span class="gradient-text">TripPilot AI</span></a><a class="btn btn-primary" href="create-trip.html">Generate Trip</a></div>
    <h1>Saved Plans</h1>
    <div class="tabs"><button class="tab active" data-type="trips">Saved Trips</button><button class="tab" data-type="hotel">Saved Hotels</button><button class="tab" data-type="attraction">Saved Attractions</button></div>
    <section id="content" class="grid"></section>
</main>
<script src="auth.js"></script><script src="api.js"></script>
<script>
requireAuth();
const content = document.getElementById('content');
function card(title, meta, image, href = '#') {
    return `<article class="card"><div class="card-img" style="background-image:url('${image || 'https://images.unsplash.com/photo-1488646953014-85cb44e25828?q=80&w=900&auto=format&fit=crop'}')"></div><div class="card-body"><h3>${title}</h3><p class="meta">${meta}</p><a class="btn btn-outline" href="${href}">Open</a></div></article>`;
}
function render(type='trips') {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.type === type));
    if (type === 'trips') {
        const trips = readLocalTrips();
        content.innerHTML = trips.length ? trips.map(t => card(t.destination, `${t.days} days • ${formatCurrency(t.budget || 0)} • ${t.travel_style}`, t.hero_image, `results.html?id=${t.id}`)).join('') : `<div class="empty" style="grid-column:1/-1;"><h2>🌍 No Trips Yet</h2><p>Start planning your first AI-powered adventure.</p><a class="btn btn-primary" href="create-trip.html">Generate Trip</a></div>`;
        return;
    }
    const items = readSavedItems(type);
    content.innerHTML = items.length ? items.map(s => {
        const item = s.item || {};
        return card(item.name || item.title || 'Saved item', `${item.location || 'Trip item'} • ${item.rating || '4.4'} • ${formatCurrency(item.estimated_cost || item.price_per_night || item.price || 0)}`, item.image, `results.html?id=${s.trip_id}`);
    }).join('') : `<div class="empty" style="grid-column:1/-1;"><h2>No saved ${type}s yet</h2><p>Save recommendations from a trip results page.</p></div>`;
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => render(t.dataset.type)));
render();
</script>
</body>
</html>
